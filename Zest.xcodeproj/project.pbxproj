			name = "Build Screen Saver";
			outputPaths = (
				"$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Zest.saver/Contents/MacOS/Zest",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\n\nSAVER_DIR=\"${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Zest.saver/Contents\"\nSAVER_BIN=\"${SAVER_DIR}/MacOS/Zest\"\n\nmkdir -p \"${SAVER_DIR}/MacOS\"\n\n# Copy Info.plist into the saver bundle\ncp \"${SRCROOT}/ZestScreenSaver/Info.plist\" \"${SAVER_DIR}/Info.plist\"\n\n# Compile the screen saver as a Mach-O bundle, once per architecture being\n# built (ARCHS can list more than one, e.g. \"arm64 x86_64\" for Archive\n# builds — a single unquoted -target would otherwise word-split and break),\n# then combine into a single universal binary via lipo.\n# -module-name ZestScreenSaver keeps symbols isolated.\n# @objc(ZestScreenSaverView) in source makes the class name match NSPrincipalClass.\nTHIN_BINARIES=\"\"\nfor ARCH in ${ARCHS}; do\n  THIN_BIN=\"${TEMP_DIR}/ZestScreenSaver-${ARCH}\"\n  swiftc \\\n    -target \"${ARCH}-apple-macos${MACOSX_DEPLOYMENT_TARGET}\" \\\n    -Xlinker -bundle \\\n    -module-name ZestScreenSaver \\\n    -o \"${THIN_BIN}\" \\\n    -framework ScreenSaver \\\n    -framework AVFoundation \\\n    -framework AppKit \\\n    -framework Foundation \\\n    \"${SRCROOT}/ZestScreenSaver/ZestScreenSaverView.swift\"\n  THIN_BINARIES=\"${THIN_BINARIES} ${THIN_BIN}\"\ndone\n\nlipo -create ${THIN_BINARIES} -output \"${SAVER_BIN}\"\n\necho \"✅ Zest.saver compiled successfully at: ${SAVER_BIN}\"\n";
		};
